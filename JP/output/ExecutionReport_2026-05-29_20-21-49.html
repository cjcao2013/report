        .layout {
          display: flex;
          height: 100vh;
          position: relative;        /* Ensures it sits above default flow */
          z-index: 1;
          position: sticky;
        }
        .vertical-tabs {
          width: 80px;
          background-color: #2c3e50;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding-top: 20px;
        }
        .tab-icon {
          font-size: 24px;
          color: white;
          margin: 20px 0;
          cursor: pointer;
          transition: transform 0.2s ease;
        }
        .tab-icon:hover {
          transform: scale(1.2);
          color: #00bfff;
        }
        .tab-icon.active {
          color: #1abc9c;
        }
        .panel {
          padding: 20px;
          overflow-y: auto;
          opacity: 0;
          transform: translateY(10px);
          transition: opacity 0.4s ease, transform 0.4s ease;
          position: absolute;
          width: calc(100% - 60px);
          left: 60px;
          top: 0;
          height: 100%;
          background-color: #f0f2f5;
          z-index: 0;
          pointer-events: none;
        }
        .panel.active {
          opacity: 1;
          transform: translateY(0);
          z-index: 1;
          pointer-events: auto;
        }
        .test-layout {
          display: flex;
        }
        #test-list {
          flex: 1;
          background-color: #fff;
          padding: 15px;
          border-right: 2px solid #ccc;
          border-radius: 10px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.05);

          overflow-y: auto;

          transition: transform 0.2s ease;

        .test-card:hover {

          max-width: 900px;
          margin: 30px auto;
          text-align: center;

          align-items: center;
          flex-wrap: wrap;
          gap: 40px;
        }
        .summary-details {
          min-width: 250px;
          padding: 20px;
          background-color: #f8f9fa;
          border: 1px solid #ccc;
          border-radius: 10px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.05);
          text-align: left;
        }
        .summary-details h3 {
          margin-top: 0;
        }
        .summary-details p {
          font-size: 16px;
          margin: 8px 0;
        }
        .report-header {

           display: flex;
           justify-content: space-between;
           align-items: center;
           background-color: #2c3e50;
           color: white;
           padding: 3px;
           border-radius: 5px;

          font-weight: bold;
        }

        .status-fail {
          color: red;
          font-weight: bold;
        }
        .scroll-box {
          height: 80px;       /* Adjust height as needed */
          overflow-y: auto;
          border: 2px solid #ccc;
          padding: 0;
          background-color: #f9f9f9;
          font-size: 13px;
          line-height: 1.4;
          white-space: pre-wrap;   /* Preserves line breaks */
          border-radius: 8px;
          width: 400px;
          font-family: Segoe UI;
          margin:0
          box-sizing: border-box;
          display: flex;
          align-items: flex-start;
          justify-content: flex-start
          text-align: left
          vertical-align: top
        }

          margin-bottom: 1px;  /* Optional: small space between label and box */
          padding: 0;
        }
        .result-row {
          display: flex;
          gap: 20px; /* Space between columns */
          margin-top: 10px;
        }

        .result-column {
          flex: 1; /* Equal width columns */
          max-width: 50%;

          font-size: 14px;

            color: #333;

            border: 1px solid #ccc;
            padding: 10px;
        }

            width: 60px
